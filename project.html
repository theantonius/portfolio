<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // Legacy deep links: project.html?section=art&id=foodmasku → /#art/foodmasku
      // Tech and education detail pages fold into their sections.
      (function () {
        var params = new URLSearchParams(location.search);
        var section = params.get("section");
        var id = params.get("id");
        var target = "/";
        if (section === "art" && id) target = "/#art/" + id;
        else if (section === "tech") target = "/#tech";
        else if (section === "education") target = "/#education";
        else if (section === "about") target = "/#about";
        location.replace(target);
      })();
    </script>
  </head>
  <body><a href="/">This page has moved</a></body>
</html>
