<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work by Antonius Wiriadjaja</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/section.css" />
    <link rel="stylesheet" href="css/project.css" />
  </head>
  <body class="section-page">

    <div class="section-container">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div>
          <a href="index.html" class="name">antoni.us/wiriadjaja</a>
          <p class="tagline">making things think.</p>
        </div>

        <div class="about">
          <p>I'm an artist, creative technologist and educator based in New York.</p>
        </div>

        <nav class="section-links">
          <a href="art.html" class="section-link" data-section="art">/art</a>
          <a href="tech.html" class="section-link" data-section="tech">/tech</a>
          <a href="education.html" class="section-link" data-section="education">/education</a>
          <a href="about.html" class="section-link" data-section="about">/about</a>
        </nav>

        <div class="contact-links">
          <a href="mailto:hi@antoni.us">Email</a>
          <a href="https://linkedin.com/in/theantonius" target="_blank">LinkedIn</a>
          <a href="https://github.com/theantonius" target="_blank">GitHub</a>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <main class="section-content">
        <div class="project-detail" id="project-detail">
          <!-- Populated by JS -->
        </div>
      </main>

    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close">✕</button>
      <button class="lightbox-prev" id="lightbox-prev">&#8592;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <button class="lightbox-next" id="lightbox-next">&#8594;</button>
      <div class="lightbox-counter" id="lightbox-counter"></div>
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script>
      // Lightbox
      let galleryImages = [];
      let galleryCaptions = [];
      let currentIndex = 0;

      function openLightbox(images, captions, index) {
        galleryImages = images;
        galleryCaptions = captions || [];
        currentIndex = index;
        showLightboxImage();
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
      }

      function showLightboxImage() {
        document.getElementById('lightbox-img').src = galleryImages[currentIndex];
        document.getElementById('lightbox-counter').textContent =
          `${currentIndex + 1} / ${galleryImages.length}`;
        document.getElementById('lightbox-prev').style.display = galleryImages.length > 1 ? '' : 'none';
        document.getElementById('lightbox-next').style.display = galleryImages.length > 1 ? '' : 'none';
        const caption = galleryCaptions[currentIndex] || '';
        const captionEl = document.getElementById('lightbox-caption');
        captionEl.textContent = caption;
        captionEl.style.display = caption ? '' : 'none';
      }

      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === document.getElementById('lightbox')) closeLightbox();
      });
      document.getElementById('lightbox-prev').addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
        showLightboxImage();
      });
      document.getElementById('lightbox-next').addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % galleryImages.length;
        showLightboxImage();
      });
      document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') {
          currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
          showLightboxImage();
        }
        if (e.key === 'ArrowRight') {
          currentIndex = (currentIndex + 1) % galleryImages.length;
          showLightboxImage();
        }
      });

      const sectionColors = {
        art:       '#f0c030',
        tech:      '#c880e8',
        education: '#70d882',
        about:     '#cccccc'
      };

      async function loadProject() {
        const params = new URLSearchParams(window.location.search);
        const section = params.get('section');
        const id = params.get('id');

        if (!section || !id) {
          document.getElementById('project-detail').innerHTML = '<p style="color:#888">Project not found.</p>';
          return;
        }

        const res = await fetch('projects.json');
        const data = await res.json();
        const projects = data[section] || [];
        const project = projects.find(p => p.id === id);

        if (!project) {
          document.getElementById('project-detail').innerHTML = '<p style="color:#888">Project not found.</p>';
          return;
        }

        const color = sectionColors[section] || '#fff';

        // Highlight sidebar link
        document.querySelectorAll('.section-link').forEach(link => {
          if (link.dataset.section === section) link.style.color = color;
        });

        document.title = `Antoni.us — ${project.title}`;

        // Back link
        const backHtml = `<a href="${section}.html" class="project-back" style="color:${color}">← /${section}</a>`;

        // Hero image
        const heroHtml = project.hero
          ? `<img src="${project.hero}" alt="${project.title}" class="project-hero" />`
          : '';

        // Description — split on blank lines so paragraphs render separately
        const descHtml = project.description
          ? project.description
              .split(/\n\n+/)
              .map(para => `<p class="project-detail-desc">${para}</p>`)
              .join('')
          : '';

        // Bulleted list
        const listHtml = project['list'] && project['list'].length ? `
          <div class="project-detail-section">
            ${project['list-title'] ? `<h4 class="project-detail-label" style="color:${color}">${project['list-title']}</h4>` : ''}
            <ul class="project-detail-list">
              ${project['list'].map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
        ` : '';

        // Exhibitions
        const exhibitionsHtml = project.exhibitions && project.exhibitions.length ? `
          <div class="project-detail-section">
            <h4 class="project-detail-label" style="color:${color}">Exhibited at</h4>
            <ul class="project-detail-list">
              ${project.exhibitions.map(e => `<li>${e}</li>`).join('')}
            </ul>
          </div>
        ` : '';

        // Press
        const pressHtml = project.press && project.press.length ? `
          <div class="project-detail-section">
            <h4 class="project-detail-label" style="color:${color}">Press</h4>
            <ul class="project-detail-list">
              ${project.press.map(p => `
                <li><a href="${p.url}" target="_blank" style="color:${color}">${p.title}</a> — ${p.publication}</li>
              `).join('')}
            </ul>
          </div>
        ` : '';

        // Gallery grid — each item can be a string URL or { thumb, full, caption }
        const galleryFullUrls = project.gallery && project.gallery.length
          ? project.gallery.map(item => typeof item === 'string' ? item : (item.full || item.thumb))
          : [];
        const galleryCaptionList = project.gallery && project.gallery.length
          ? project.gallery.map(item => typeof item === 'object' && item.caption ? item.caption : '')
          : [];

        const galleryHtml = project.gallery && project.gallery.length ? `
          <div class="project-gallery">
            ${project.gallery.map((item, i) => {
              const thumbSrc = typeof item === 'string' ? item : item.thumb;
              const caption = typeof item === 'object' && item.caption ? item.caption : '';
              return `
                <div class="gallery-item">
                  <img src="${thumbSrc}" alt="${project.title}" class="project-gallery-img" data-index="${i}" />
                  ${caption ? `<p class="gallery-caption">${caption}</p>` : ''}
                </div>`;
            }).join('')}
          </div>
        ` : '';

        // External link
        const linkHtml = project.link
          ? `<a href="${project.link}" target="_blank" class="project-ext-link" style="color:${color}">View project ↗</a>`
          : '';

        document.getElementById('project-detail').innerHTML = `
          ${backHtml}
          ${heroHtml}
          <h1 class="project-detail-title" style="color:${color}">${project.title}</h1>
          <p class="project-detail-meta">${project.year ? project.year + ' — ' : ''}${project.medium}</p>
          ${descHtml}
          ${listHtml}
          ${exhibitionsHtml}
          ${pressHtml}
          ${galleryHtml}
          ${linkHtml}
        `;

        // Attach lightbox click handlers now that images are in the DOM
        document.querySelectorAll('.project-gallery-img').forEach(img => {
          img.addEventListener('click', () => {
            openLightbox(galleryFullUrls, galleryCaptionList, parseInt(img.dataset.index));
          });
        });
      }

      loadProject();
    </script>

  </body
